# One-command local deployment:  docker compose -f deploy/docker-compose.yml up --build
# API:        http://localhost:8000  (Swagger at /docs)
# Dashboard:  http://localhost:8501
services:
  api:
    build:
      context: ..                # repo root is the build context
      dockerfile: deploy/Dockerfile
    image: netflix-recsys
    command: uvicorn deploy.api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  dashboard:
    image: netflix-recsys           # reuse the image built by `api`
    command: streamlit run deploy/dashboard.py --server.port 8501 --server.address 0.0.0.0
    environment:
      - API_URL=http://api:8000
    ports:
      - "8501:8501"
    depends_on:
      api:
        condition: service_healthy
